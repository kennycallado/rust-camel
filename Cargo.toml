    "crates/camel-processor",
    "crates/camel-health",
    "crates/services/camel-bridge",
    "crates/camel-config",
    "crates/camel-dsl",
    "crates/camel-builder",
    "crates/components/camel-component-api",
    "crates/camel-endpoint",
    "crates/camel-endpoint-macros",
    "crates/camel-test",
    "crates/components/camel-timer",
    "crates/components/camel-log",
    "crates/components/camel-file",
    "crates/components/camel-direct",
    "crates/components/camel-mock",
    "crates/components/camel-http",
    "crates/components/camel-ws",
    "crates/components/camel-redis",
    "crates/components/camel-kafka",
    "crates/components/camel-jms",
    "crates/components/camel-sql",
    "crates/components/camel-controlbus",
    "crates/languages/camel-language-api",
    "crates/languages/camel-language-js",
    "crates/languages/camel-language-rhai",
    "crates/languages/camel-language-simple",
    "crates/languages/camel-language-jsonpath",
    "crates/languages/camel-language-xpath",
    "crates/camel-bench",
    "examples/hello-world",
    "examples/kafka-example",
    "examples/redis-example",
    "examples/jms-example",
    "examples/jms-container-example",
    "examples/content-based-routing",
    "examples/multi-route-direct",
    "examples/transform-pipeline",
    "examples/showcase",
    "examples/error-handling",
    "examples/splitter",
    "examples/file-polling",
    "examples/file-pipeline",
    "examples/sql-example",
    "examples/sql-streaming",
    "examples/http-client",
    "examples/aggregator",
    "examples/wiretap",
    "examples/multicast",
    "examples/http-server",
    "examples/ws-server",
    "examples/http-streaming",
    "examples/file-streaming",
    "examples/pipeline-concurrency",
    "examples/log-eip",
    "examples/lazy-route",
    "examples/circuit-breaker",
    "examples/exchange-uow",
    "examples/metrics-demo",
    "examples/controlbus",
    "examples/language-simple",
    "examples/language-rhai",
    "examples/language-js",
    "examples/language-jsonpath",
    "examples/language-xpath",
    "examples/hot-reload",
    "examples/hot-reload-yaml",
    "examples/xml-body",
    "examples/yaml-dsl",
    "examples/env-interpolation",
    "examples/config-basic",
    "examples/config-profiles",
    "examples/auto-restart",
    "examples/tracer-demo",
    "examples/convert-body-to",
    "examples/marshal-unmarshal",
    "examples/bean-demo",
    "examples/prometheus-demo",
    "examples/health-demo",
    "examples/otel-demo",
    "examples/container-example",
    "examples/container-nginx",
    "examples/container-hot-reload",
    "examples/dynamic-router",
    "examples/routing-slip",
    "examples/load-balancer",
    "examples/throttler",
    "examples/delayer",
    "examples/custom-component-bundle",
    "crates/components/camel-container",
    "crates/services/camel-prometheus",
    "crates/services/camel-otel",
]

[workspace.metadata.crane]
name = "rust-camel"

[workspace.package]
version = "0.6.2"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/kennycallado/rust-camel"
homepage = "https://github.com/kennycallado/rust-camel"
documentation = "https://docs.rs/camel-api"
readme = "README.md"
keywords = ["camel", "integration", "messaging", "routing", "enterprise"]
categories = ["network-programming", "asynchronous", "development-tools"]

[workspace.dependencies]
# IMPORTANT: when bumping [workspace.package].version, update all "=X.Y.Z"
# below to match using: sed -i 's/version = "=OLD"/version = "=NEW"/g' Cargo.toml
# Exact pinning (=) ensures cargo publish verifies against the exact version
# being released, not an older one already on crates.io.
camel-api = { path = "crates/camel-api", version = "=0.6.2" }
camel-bean = { path = "crates/camel-bean", version = "=0.6.2" }
camel-bean-macros = { path = "crates/camel-bean-macros", version = "=0.6.2" }
camel-cli = { path = "crates/camel-cli", version = "=0.6.2" }
camel-core = { path = "crates/camel-core", version = "=0.6.2" }
camel-util = { path = "crates/camel-util", version = "=0.6.2" }
camel-support = { path = "crates/camel-support", version = "=0.6.2" }
camel-processor = { path = "crates/camel-processor", version = "=0.6.2" }
camel-health = { path = "crates/camel-health", version = "=0.6.2" }
camel-bridge = { path = "crates/services/camel-bridge", version = "=0.6.2" }
camel-dsl = { path = "crates/camel-dsl", version = "=0.6.2" }
camel-builder = { path = "crates/camel-builder", version = "=0.6.2" }
camel-component-api = { path = "crates/components/camel-component-api", version = "=0.6.2" }
camel-endpoint = { path = "crates/camel-endpoint", version = "=0.6.2" }
camel-endpoint-macros = { path = "crates/camel-endpoint-macros", version = "=0.6.2" }
camel-test = { path = "crates/camel-test", version = "=0.6.2" }
camel-component-timer = { path = "crates/components/camel-timer", version = "=0.6.2" }
camel-component-log = { path = "crates/components/camel-log", version = "=0.6.2" }
camel-component-file = { path = "crates/components/camel-file", version = "=0.6.2" }
camel-component-direct = { path = "crates/components/camel-direct", version = "=0.6.2" }
camel-component-mock = { path = "crates/components/camel-mock", version = "=0.6.2" }
camel-component-http = { path = "crates/components/camel-http", version = "=0.6.2" }
camel-component-ws = { path = "crates/components/camel-ws", version = "=0.6.2" }
camel-component-redis = { path = "crates/components/camel-redis", version = "=0.6.2" }
camel-component-kafka = { path = "crates/components/camel-kafka", version = "=0.6.2" }
camel-component-jms = { path = "crates/components/camel-jms", version = "=0.6.2" }
camel-component-sql = { path = "crates/components/camel-sql", version = "=0.6.2" }
camel-component-controlbus = { path = "crates/components/camel-controlbus", version = "=0.6.2" }
camel-component-prometheus = { path = "crates/services/camel-prometheus", version = "=0.6.2" }
camel-component-otel = { path = "crates/services/camel-otel", version = "=0.6.2" }
camel-otel = { path = "crates/services/camel-otel", version = "=0.6.2" }
camel-prometheus = { path = "crates/services/camel-prometheus", version = "=0.6.2" }
camel-component-container = { path = "crates/components/camel-container", version = "=0.6.2" }
camel-language-api = { path = "crates/languages/camel-language-api", version = "=0.6.2" }
camel-language-js = { path = "crates/languages/camel-language-js", version = "=0.6.2" }
camel-language-rhai = { path = "crates/languages/camel-language-rhai", version = "=0.6.2" }
camel-language-simple = { path = "crates/languages/camel-language-simple", version = "=0.6.2" }
camel-language-jsonpath = { path = "crates/languages/camel-language-jsonpath", version = "=0.6.2" }
camel-language-xpath = { path = "crates/languages/camel-language-xpath", version = "=0.6.2" }
camel-config = { path = "crates/camel-config", version = "=0.6.2" }

tokio = { version = "1", features = ["full"] }
tonic = { version = "0.12" }
prost = { version = "0.13" }
tonic-build = { version = "0.12" }
protoc-bin-vendored = "3"
tower = { version = "0.5", features = ["util"] }
async-trait = "0.1"
thiserror = "2"
anyhow = "1"
bytes = "1"
futures = "0.3"
tracing = "0.1"
tokio-util = { version = "0.7", features = ["rt", "io"] }
dashmap = "6"
chrono = { version = "0.4", features = ["serde"] }
tracing-subscriber = { version = "0.3", features = ["fmt", "json", "env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["rustls-tls", "stream"], default-features = false }
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
dirs = "5"
regex = "1"
redb = "2"
axum = { version = "0.8" }
http = "1"
url = "2"
libc = "0.2"
uuid = { version = "1", features = ["v4"] }
rhai = { version = "1", features = ["sync"] }
# Pin to 0.20: versions >= 0.21 make Context !Send + !Sync
boa_engine = { version = "0.20", features = [] }
arc-swap = "1"
serde_yaml = "0.9"
config = "0.14"
glob = "0.3"
notify = { version = "6", features = ["macos_fsevent"] }
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["kafka", "postgres", "redis"] }
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
prometheus = "0.14"
rand = "0.8"
quick-xml = { version = "0.37", features = ["serialize"] }
toml = "0.8"

# OpenTelemetry dependencies
opentelemetry = { version = "0.31", features = ["trace", "logs", "metrics"] }
opentelemetry_sdk = { version = "0.31", features = ["trace", "logs", "metrics", "rt-tokio"] }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic", "http-proto", "trace", "logs", "metrics"] }
opentelemetry-semantic-conventions = { version = "0.31", features = ["semconv_experimental"] }
opentelemetry-appender-tracing = { version = "0.31" }
tracing-opentelemetry = { version = "0.32", features = [] }

[profile.dev]
debug = 1
split-debuginfo = "packed"

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
strip = true
codegen-units = 1
