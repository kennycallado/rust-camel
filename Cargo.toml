[workspace]
resolver = "2"
members = [
    "crates/camel-api",
    "crates/camel-core",
    "crates/camel-util",
    "crates/camel-support",
    "crates/camel-processor",
    "crates/camel-health",
    "crates/camel-dsl",
    "crates/camel-builder",
    "crates/camel-component",
    "crates/camel-endpoint",
    "crates/camel-test",
    "crates/components/camel-timer",
    "crates/components/camel-log",
    "crates/components/camel-file",
    "crates/components/camel-direct",
    "crates/components/camel-mock",
    "crates/components/camel-http",
    "crates/components/camel-redis",
    "crates/components/camel-controlbus",
    "examples/hello-world",
    "examples/content-based-routing",
    "examples/multi-route-direct",
    "examples/transform-pipeline",
    "examples/showcase",
    "examples/error-handling",
    "examples/splitter",
    "examples/file-polling",
    "examples/file-pipeline",
    "examples/http-client",
    "examples/aggregator",
    "examples/wiretap",
    "examples/multicast",
    "examples/http-server",
    "examples/pipeline-concurrency",
    "examples/log-eip",
    "examples/lazy-route",
    "examples/circuit-breaker",
    "examples/metrics-demo",
    "examples/controlbus",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/user/rust-camel"

[workspace.dependencies]
camel-api = { path = "crates/camel-api" }
camel-core = { path = "crates/camel-core" }
camel-util = { path = "crates/camel-util" }
camel-support = { path = "crates/camel-support" }
camel-processor = { path = "crates/camel-processor" }
camel-health = { path = "crates/camel-health" }
camel-dsl = { path = "crates/camel-dsl" }
camel-builder = { path = "crates/camel-builder" }
camel-component = { path = "crates/camel-component" }
camel-endpoint = { path = "crates/camel-endpoint" }
camel-test = { path = "crates/camel-test" }
camel-timer = { path = "crates/components/camel-timer" }
camel-log = { path = "crates/components/camel-log" }
camel-file = { path = "crates/components/camel-file" }
camel-direct = { path = "crates/components/camel-direct" }
camel-mock = { path = "crates/components/camel-mock" }
camel-http = { path = "crates/components/camel-http" }
camel-redis = { path = "crates/components/camel-redis" }
camel-controlbus = { path = "crates/components/camel-controlbus" }

tokio = { version = "1", features = ["full"] }
tower = { version = "0.5", features = ["util"] }
async-trait = "0.1"
thiserror = "2"
anyhow = "1"
bytes = "1"
tracing = "0.1"
tokio-util = { version = "0.7", features = ["rt"] }
tracing-subscriber = { version = "0.3", features = ["fmt"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }
regex = "1"
axum = { version = "0.8" }
http = "1"
url = "2"
uuid = { version = "1", features = ["v4"] }
