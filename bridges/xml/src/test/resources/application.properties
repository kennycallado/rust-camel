# Test profile: disable TLS for in-process gRPC health checks.
# TLS is only needed when the Rust parent spawns the bridge with mTLS.
quarkus.http.ssl-port=-1
quarkus.http.insecure-requests=enabled
quarkus.http.ssl.client-auth=NEVER
quarkus.grpc.server.plain-text=true
quarkus.grpc.server.use-separate-server=true
