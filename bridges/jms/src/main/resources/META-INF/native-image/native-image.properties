# Additional GraalVM build-time arguments for jms-bridge
#
# --initialize-at-build-time: logging frameworks needed at build time
# --initialize-at-run-time:
#   1. Artemis shaded JGroups — network interface scanning at <clinit>
#   2. Artemis utils — RandomUtil has a static Random field (image-heap ban)
#   3. Artemis core client impl — ServerLocatorImpl references RandomUtil
#   4. Artemis loadbalance — some policies reference Random
#   5. ActiveMQ Classic — thread-local and connection state with Random seeds
#   6. Artemis API core — ActiveMQBuffers has Netty buffer state
#   7. Artemis shaded commons-beanutils — BeanSupport class init
#
# These are set at PACKAGE level to avoid whack-a-mole with individual classes.

Args = --initialize-at-build-time=org.slf4j \
       -H:IncludeResources=META-INF/services/org/apache/activemq/.* \
       -H:IncludeResources=activemq-version.properties \
       --initialize-at-run-time=org.apache.activemq.artemis.shaded.org.jgroups \
       --initialize-at-run-time=org.apache.activemq.artemis.utils \
       --initialize-at-run-time=org.apache.activemq.artemis.core.client.impl \
       --initialize-at-run-time=org.apache.activemq.artemis.api.core.client.loadbalance \
       --initialize-at-run-time=org.apache.activemq.artemis.shaded.org.apache.commons.beanutils \
       --initialize-at-run-time=org.apache.activemq.artemis.api.core.ActiveMQBuffers
