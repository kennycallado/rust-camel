# Benchmark v2 Spike 1A config (bd rc-p9ki).
#
# Self-contained: copies the ADR-0033 fail-closed stub from the
# production rust-camel-cli fixture so the spike exercises the same
# CLI startup path. Bare `true` resolves via PATH (no /bin/true on
# NixOS).
[default]
routes = ["routes/*.yaml"]
log_level = "INFO"
watch = false

[default.components.exec]
workspace_root = "."

[[default.components.exec.profiles]]
name = "bench-stub"
executable = "true"

[default.supervision]
max_attempts = 5
initial_delay_ms = 1000
backoff_multiplier = 2.0
max_delay_ms = 60000
