quarkus.banner.enabled=false
# Spike 1B: camel-quarkus-yaml-dsl needs the routes YAML embedded into
# the native image AND the runtime discovery pattern must point at the
# specific file (not the default wildcard `classpath:camel/*`).
#
# Why both:
# - `quarkus.native.resources.includes` registers the file with Substrate VM
#   so `getResource("camel/routes.yaml")` (singular) works in native mode.
# - `camel.main.routesIncludePattern` overrides the DEFAULT
#   `classpath:camel/*,classpath:camel-template/*,classpath:camel-rest/*`
#   pattern (see DefaultConfigurationProperties.routesIncludePattern).
#   Substrate VM cannot enumerate directory contents, so the wildcard
#   `camel/*` returns no resources at runtime even when the file is
#   embedded. Pointing the pattern at the specific file bypasses the
#   wildcard and the route is discovered.
quarkus.native.resources.includes=camel/routes.yaml
camel.main.routesIncludePattern=classpath:camel/routes.yaml
