# Pair B route for T3 HTTP server scenario (bd Task 3).
#
# Same logical route as camel-quarkus-dsl/BenchRoute.java
# (`from(platform-http:/bench).setBody(pong)`) but authored in
# Apache Camel YAML DSL. Both yaml variants (JVM and native)
# serve over `platform-http:` — Quarkus' recommended HTTP
# component, backed by its managed Vert.x/Netty layer. The
# marker `BENCH_ROUTE_READY <unix_ms>` is emitted by a CDI
# observer in src/main/java/com/rustcamel/bench/RouteStartedMarker.java
# (same observer as the dsl subproject — notifier fires on
# CamelEvent.RouteStarted, which is listener-bound per
# spec §4.10).
#
# Canonical minimal: no per-request counter, no process step,
# no log emission, no bean invocation. The harness measures
# cold-start + RSS, not request latency; per-request
# observability belongs to the loadgen, not the fixture.
#
# No method restriction on the consumer: the loadgen drives
# only POST `/bench`, so restricting it is unnecessary and
# would diverge from the rust-camel fixtures (which accept any
# method). All fixtures are kept identical on this axis.
- route:
    from:
      uri: "platform-http:/bench"
      steps:
        - setBody:
            constant: "pong"
