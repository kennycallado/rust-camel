quarkus.http.port=8080
quarkus.banner.enabled=false

# Right-size the native-image heap. Mandrel CE defaults Serial GC
# max heap to 80% of RAM (~22GB) — each GC pause traverses the
# entire heap single-threaded, crushing sustained throughput.
# 512m is realistic for a K8s sidecar (the benchmark ICP) and
# makes each GC cycle orders of magnitude shorter.
quarkus.native.additional-build-args=-R:MaxHeapSize=512m
