quarkus.banner.enabled=false

# Right-size the native-image heap. Mandrel CE defaults Serial GC
# max heap to 80% of RAM (~22GB) — each GC pause traverses the
# entire heap single-threaded, crushing sustained throughput.
# 512m is realistic for a K8s sidecar (the benchmark ICP) and
# makes each GC cycle orders of magnitude shorter.
quarkus.native.additional-build-args=-R:MaxHeapSize=512m

# T3 HTTP server scenario: enable route auto-discovery
# (Quarkus' default), don't override routesIncludePattern
# (the YAML route file is auto-discovered at
# classpath:camel/routes.yaml by Camel Quarkus' default
# route discovery — no override needed for the JVM
# runtime; Substrate VM (the native subproject) cannot
# enumerate classpath directories and needs the
# `quarkus.native.resources.includes=camel/routes.yaml`
# + `camel.main.routesIncludePattern=classpath:camel/routes.yaml`
# combo from application.properties in the native
# subproject's local src/main/resources/).
