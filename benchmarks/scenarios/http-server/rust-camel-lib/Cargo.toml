[package]
name = "http-server-rust-camel-lib"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
# Path deps resolve to the worktree's own checkout of rust-camel crates
# (4 levels up: rust-camel-lib/ -> http-server/ -> scenarios/ -> benchmarks/ -> worktree root).
# Same layout as the v1 / T2 lib fixtures.
camel-api = { path = "../../../../crates/camel-api" }
camel-builder = { path = "../../../../crates/camel-builder" }
camel-core = { path = "../../../../crates/camel-core" }
camel-processor = { path = "../../../../crates/camel-processor" }
camel-component-http = { path = "../../../../crates/components/camel-http" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }

# Workspace member of the parent rust-camel workspace (auto-discovered
# by cargo from the root Cargo.toml). Sharing the workspace Cargo.lock
# guarantees transitive dep version parity with the rust-camel-cli T3
# fixture (Pair B) so Pair A vs Pair B isolates only parser/CLI
# overhead, not dep drift (per the v1 / T2 fairness invariant).

[[bin]]
name = "http-server"
path = "src/main.rs"
