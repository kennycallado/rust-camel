# Benchmark fixture for rust-camel CLI + YAML (Pair B partner, T2 scenario,
# bd rc-p9ki Task 3). Mirrors the v1 fixture's
# `benchmarks/scenarios/startup-minimal/rust-camel-cli/Camel.toml` — same
# ADR-0033 fail-closed exec stub, same supervision block — but lives under
# the T2 scenario dir so the harness picks up the T2 route on a T2 run.
#
# The T2 Pair B comparison (YAML) is language-subsystem-equivalent to
# Apache Camel (both use Simple `${body}` / `${header.<name>}`); this is
# NOT the case for T2 Pair A (`rust-camel-lib` uses closure predicates —
# see that fixture's comments). The marker `BENCH_ROUTE_READY body=pong-bench`
# is emitted by the route's `log` step, which carries the post-choice body
# so a wrong-branch run (otherwise → `pong-other`) is observable, not silent.

[default]
routes = ["routes/*.yaml"]
log_level = "INFO"
watch = false

# ADR-0033 fail-closed workaround: ExecBundle requires at least one profile
# to pass startup validation, even when no route uses `exec:` URIs. The stub
# below registers `true` (a no-op that always exits 0) under the name
# `bench-stub` so validation succeeds. It is never invoked by the benchmark.
# NixOS note: bare `true` resolves via PATH at CLI startup; do NOT hardcode
# `/bin/true` (NixOS has no FHS, /bin/true does not exist).
[default.components.exec]
workspace_root = "."

# `profiles` is a Vec<ExecProfile> — TOML array-of-tables syntax ([[...]]),
# NOT a map ([default.components.exec.profiles.<name>] would deserialize
# as a struct/map and fail with "invalid type: map, expected a sequence").
[[default.components.exec.profiles]]
name = "bench-stub"
executable = "true"

[default.supervision]
max_attempts = 5
initial_delay_ms = 1000
backoff_multiplier = 2.0
max_delay_ms = 60000
