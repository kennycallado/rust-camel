quarkus.banner.enabled=false

# bd rc-p9ki Task 2 — required for camel-quarkus-yaml-dsl in native mode
# on this host (see benchmarks/spike-results.md, "NixOS + native-image
# resource discovery"). Both keys are load-bearing:
#
# - quarkus.native.resources.includes registers camel/routes.yaml with
#   Substrate VM at build time so getResource("camel/routes.yaml")
#   (singular) works in native mode.
#
# - camel.main.routesIncludePattern overrides the DEFAULT
#   `classpath:camel/*,classpath:camel-template/*,classpath:camel-rest/*`
#   pattern (DefaultConfigurationProperties.routesIncludePattern).
#   Substrate VM cannot enumerate directory contents, so the wildcard
#   `camel/*` returns no resources at native runtime even when the file
#   is embedded. Pointing the pattern at the specific file bypasses the
#   wildcard and the route is discovered.
quarkus.native.resources.includes=camel/routes.yaml
camel.main.routesIncludePattern=classpath:camel/routes.yaml
