# T4b XSD validation bridge fixture — rust-camel CLI + YAML (Pair B, bd Task 4).
#
# Mirror of T4a's Camel.toml shape. Engine pinning per spec §4.8: the
# bridge binary provides Xerces-J 2.12.2 via bridges/xml/build.gradle.kts.

[default]
routes = ["routes/*.yaml"]
log_level = "INFO"
watch = false

[default.components.exec]
workspace_root = "."

[[default.components.exec.profiles]]
name = "bench-stub"
executable = "true"

[default.supervision]
max_attempts = 5
initial_delay_ms = 1000
backoff_multiplier = 2.0
max_delay_ms = 60000
