# camel-quarkus-dsl (and -native) application properties.
#
# Engine pinning: BenchRoute invokes Saxon-HE 12.5 directly (no
# camel-quarkus-xslt on the classpath — see build.gradle.kts). The
# native-image build args below mirror bridges/xml/application.yml:
# Saxon's RandomNumberGenerator uses ThreadLocalRandom which cannot
# be initialized at build time; xmlresolver's static catalog load
# also defers to runtime. Without these the native build fails at
# image-recipe time. Comma-separated list per Quarkus convention.
#
# NOTE: the stylesheet is compiled LAZILY at runtime (see
# BenchRoute.templates()), exactly as bridges/xml/
# XsltTransformerService does. There is deliberately NO
# --initialize-at-build-time=com.rustcamel.bench.BenchRoute: baking the
# route class at build time drags a fully-constructed Saxon
# Configuration into the image heap, whose commonResolver field holds
# an org.xmlresolver.Resolver marked --initialize-at-run-time — an
# unsupported build-time/run-time initialization conflict. Keeping
# Saxon + xmlresolver strictly runtime-initialized mirrors the
# production bridge and keeps the markers below consistent.
# External xercesImpl parser error-message bundles must be embedded:
# Saxon 12.5's ActiveSAXSource sets SAX properties/features on the
# reader; any negotiation failure formats its message via these
# ResourceBundles (org.apache.xerces.impl.msg.*). Without them a
# MissingResourceException masks the real SAXNotRecognizedException.
# The bundle list lives in resource-config.json (single source of
# truth); do NOT duplicate as -H:IncludeResourceBundles=... here.
quarkus.native.resources.includes=identity-transform.xsl,org/apache/xerces/impl/msg/*.properties
# Run-time init markers (comma-separated per Quarkus convention):
# - net.sf.saxon.functions.hof.RandomNumberGenerator: ThreadLocalRandom
#   cannot initialize at build time.
# - org.xmlresolver: static catalog load defers to runtime.
# - org.xmlresolver.utils.SaxProducer: needed because Jing (pulled in
#   transitively by Saxon-HE 12.5's xmlresolver) extends this class.
#   Not invoked at runtime for our identity-transform workload, but
#   native-image closed-world analysis requires it to be initializable.
# - org.apache.hc.client5.http.impl.auth.NTLMEngineImpl: Saxon pulls
#   this in transitively; its static init does unrecognized reflection.
quarkus.native.additional-build-args=--initialize-at-run-time=net.sf.saxon.functions.hof.RandomNumberGenerator,--initialize-at-run-time=org.xmlresolver,--initialize-at-run-time=org.xmlresolver.utils.SaxProducer,--initialize-at-run-time=org.apache.hc.client5.http.impl.auth.NTLMEngineImpl,-H:+AllowVMInspection,-Djdk.xml.entityExpansionLimit=64
