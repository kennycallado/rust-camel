[package]
name = "camel-component-llm"
description = "LLM integration component for rust-camel (chat, embeddings)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/camel-component-llm"

keywords.workspace = true
categories.workspace = true

[dependencies]
camel-api = { workspace = true }
camel-component-api = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
url = { workspace = true }
thiserror = { workspace = true }
async-stream = { workspace = true }

# Provider adapters (optional) — ONLY files that import siumai
siumai = { version = "=0.11.0-beta.9", default-features = false, optional = true }
siumai-core = { version = "=0.11.0-beta.9", optional = true }
siumai-provider-openai = { version = "=0.11.0-beta.9", optional = true }
siumai-provider-ollama = { version = "=0.11.0-beta.9", optional = true }

[features]
default = ["mock"]
mock = []
openai = ["siumai/openai", "siumai-core", "siumai-provider-openai"]
ollama = ["siumai/ollama", "siumai-core", "siumai-provider-ollama"]
all-providers = [
    "siumai/all-providers",
    "siumai-core",
    "siumai-provider-openai",
    "siumai-provider-ollama",
]

[dev-dependencies]
camel-component-api = { workspace = true, features = ["test-support"] }
camel-builder = { workspace = true }
camel-core = { workspace = true }
camel-component-timer = { workspace = true }
camel-component-mock = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }
tracing-test = { version = "0.2", features = ["no-env-filter"] }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
