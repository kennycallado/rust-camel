[package]
name = "camel-component-cxf"
description = "CXF/SOAP component for rust-camel via Java bridge"
readme = "README.md"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["camel", "cxf", "soap", "ws", "webservice"]
categories = ["network-programming", "asynchronous"]

[features]
default = []
test-util = []

[dependencies]
camel-component-api = { workspace = true }
camel-bridge    = { workspace = true }
tonic           = { workspace = true }
tonic-prost     = { workspace = true }
prost           = { workspace = true }
tokio           = { workspace = true }
async-trait     = { workspace = true }
tower           = { workspace = true }
tracing         = { workspace = true }
bytes           = { workspace = true }
serde_json      = { workspace = true }
uuid            = { workspace = true }
futures         = { workspace = true }
tokio-util      = { workspace = true }
dashmap         = { workspace = true }
serde           = { workspace = true }
toml            = { workspace = true }
thiserror       = { workspace = true }
tokio-stream    = { workspace = true }

[dev-dependencies]
camel-component-cxf = { path = ".", features = ["test-util"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net"] }
tokio-stream = { workspace = true }
tonic = { workspace = true }

[build-dependencies]
tonic-prost-build = { workspace = true }
protoc-bin-vendored = { workspace = true }
