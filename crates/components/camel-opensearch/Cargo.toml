[package]
name = "camel-component-opensearch"
description = "OpenSearch component for rust-camel"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/camel-component-opensearch"
readme = "README.md"
keywords = ["camel", "opensearch", "integration", "messaging", "search"]
categories = ["database", "asynchronous", "network-programming"]

[dependencies]
camel-component-api = { workspace = true }
opensearch = { version = "2.4.0", default-features = false, features = ["rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tower = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
futures-util = "0.3"

[lints]
workspace = true
