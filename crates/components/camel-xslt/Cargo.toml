[package]
name = "camel-xslt"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "XSLT Component for rust-camel (via xml-bridge)"
readme = "README.md"

# XSLT-015: Feature flags for alternative XSLT implementations.
# Currently all XSLT processing goes through the xml-bridge gRPC sidecar
# (built from bridges/xslt/). Future work could add optional backends:
#   [features]
#   default = ["bridge"]
#   bridge  = []                    # xml-bridge sidecar (current behaviour)
#   native  = ["xslt-lib"]          # hypothetical native Rust XSLT via libxslt
#   xslt-lib = { package = "some-xslt-crate", version = "x.y", optional = true }

[dependencies]
camel-api = { workspace = true }
camel-component-api = { workspace = true }
camel-bridge = { workspace = true }
tonic = { workspace = true }
tonic-prost = { workspace = true }
prost = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt"] }
async-trait = { workspace = true }
dashmap = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
tower = { workspace = true }

[build-dependencies]
tonic-prost-build = { workspace = true }
protoc-bin-vendored = { workspace = true }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
