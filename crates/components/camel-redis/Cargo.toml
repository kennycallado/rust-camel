[package]
name = "camel-component-redis"
description = "Redis component for rust-camel"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/camel-component-redis"
readme = "README.md"
keywords = ["camel", "redis", "integration", "messaging", "cache"]
categories = ["database", "asynchronous", "network-programming"]

[dependencies]
camel-api = { workspace = true }
camel-component-api = { workspace = true }
redis = { workspace = true, features = ["tokio-comp", "aio"] }
tokio = { workspace = true }
async-trait = { workspace = true }
tower = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tokio-util = { workspace = true }
futures-util = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
percent-encoding = { workspace = true }

[features]
default = []
tls = ["redis/tls-rustls-webpki-roots", "redis/tokio-rustls-comp"]
cluster = []
sentinel = []

[lints]
workspace = true

[dev-dependencies]
camel-component-api = { workspace = true, features = ["test-support"] }
