[package]
name = "camel-component-redis"
description = "Redis component for rust-camel"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/camel-component-redis"
readme = "README.md"
keywords = ["camel", "redis", "integration", "messaging", "cache"]
categories = ["database", "asynchronous", "network-programming"]

[dependencies]
camel-component-api = { workspace = true }
redis = { version = "1", features = ["tokio-comp", "aio"] }
tokio = { workspace = true }
async-trait = { workspace = true }
tower = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tokio-util = { workspace = true }
futures-util = "0.3"
