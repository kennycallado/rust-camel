name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libclang-dev
      - name: Build
        run: cargo build --workspace
      - name: Test (unit only — no Docker required)
        run: cargo test --workspace --lib

  full-tests-linux:
    name: Full Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        run: sudo apt-get install -y libclang-dev
      - name: Docker availability
        run: docker info
      - name: Pull container test images
        run: docker pull alpine:latest
      - name: Build
        run: cargo build --workspace
      - name: Hexagonal boundaries (camel-core)
        run: cargo test -p camel-core --test hexagonal_architecture_boundaries_test
      - name: Build JMS bridge binary
        run: cargo xtask build-jms-bridge
      - name: JMS integration tests
        env:
          CAMEL_JMS_BRIDGE_BINARY_PATH: ${{ github.workspace }}/bridges/jms/build/native/jms-bridge
        run: cargo test -p camel-test --features integration-tests --test jms_test
      - name: Build XML bridge binary
        run: cargo xtask build-xml-bridge
      - name: XML bridge integration tests
        env:
          CAMEL_XML_BRIDGE_BINARY_PATH: ${{ github.workspace }}/bridges/xml/build/native/xml-bridge
        run: cargo test -p camel-test --features integration-tests --test xml_bridge_validator_test --test xml_bridge_xslt_test
      - name: Container integration tests
        run: cargo test -p camel-test --features integration-tests --test container_test
      - name: Test (full workspace)
        run: cargo test --workspace

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools
      - name: Install target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build musl binary
        run: cargo build -p camel-cli --release --target x86_64-unknown-linux-musl
      - name: Prepare Docker context
        run: |
          mkdir -p context
          cp target/x86_64-unknown-linux-musl/release/camel context/camel-amd64
          chmod +x context/camel-amd64
          cp Dockerfile context/Dockerfile
          docker run --rm alpine:3.21 cat /etc/ssl/certs/ca-certificates.crt > context/ca-certificates.crt
      - name: Build production image
        run: docker build --target production -t camel-smoke:production context/
      - name: Build alpine image
        run: docker build --target alpine -t camel-smoke:alpine context/
      - name: Test production image
        run: |
          OUTPUT=$(docker run --rm camel-smoke:production --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "camel"
      - name: Test alpine image
        run: |
          OUTPUT=$(docker run --rm camel-smoke:alpine --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "camel"

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        run: sudo apt-get install -y libclang-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build
        run: cargo build --workspace
      - name: Run coverage check
        run: ./scripts/coverage.sh
