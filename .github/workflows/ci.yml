name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libclang-dev
      - name: Build
        run: cargo build --workspace
      - name: Test (unit only — no Docker required)
        run: cargo test --workspace --lib

  full-tests-linux:
    name: Full Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        run: sudo apt-get install -y libclang-dev
      - name: Docker availability
        run: docker info
      - name: Build
        run: cargo build --workspace
      - name: Hexagonal boundaries (camel-core)
        run: cargo test -p camel-core --test hexagonal_architecture_boundaries_test
      - name: Build JMS bridge binary
        run: cargo xtask build-jms-bridge
      - name: JMS integration tests
        env:
          CAMEL_JMS_BRIDGE_BINARY_PATH: ${{ github.workspace }}/bridges/jms/build/native/jms-bridge
        run: cargo test -p camel-test --features integration-tests
      - name: Test (full workspace)
        run: cargo test --workspace

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install libclang for bindgen
        run: sudo apt-get install -y libclang-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build
        run: cargo build --workspace
      - name: Run coverage check
        run: ./scripts/coverage.sh
