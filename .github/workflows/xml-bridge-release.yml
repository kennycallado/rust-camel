name: XML Bridge Release

on:
  push:
    tags:
      - 'xml-bridge-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            target: linux-musl-x86_64
            build_method: docker
          - os: macos-arm
            runner: macos-latest
            target: macos-aarch64
            build_method: native
          - os: windows
            runner: windows-latest
            target: windows-x86_64
            build_method: native

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup GraalVM (native builds)
        if: matrix.build_method == 'native'
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1.5.3
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activate MSVC (Windows only)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Cache Gradle dependencies (Docker)
        if: matrix.build_method == 'docker'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: bridges/xml/.gradle-docker-cache
          key: gradle-${{ hashFiles('bridges/xml/build.gradle.kts', 'bridges/xml/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Cache Gradle dependencies (native)
        if: matrix.build_method == 'native'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: bridges/xml/.gradle-local-cache
          key: gradle-native-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('bridges/xml/build.gradle.kts', 'bridges/xml/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-native-${{ runner.os }}-${{ matrix.target }}-

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#xml-bridge-v}" >> $GITHUB_OUTPUT

      - name: Build native bridge (Docker)
        if: matrix.build_method == 'docker'
        run: cargo xtask build-xml-bridge --version ${{ steps.version.outputs.version }}

      - name: Build native bridge (native)
        if: matrix.build_method == 'native'
        run: cargo xtask build-bridge-native --bridge xml --version ${{ steps.version.outputs.version }} --target ${{ matrix.target }}

      - name: Verify static binary (Linux only)
        if: matrix.os == 'linux'
        run: |
          BINARY=$(find bridges/xml/build/native -name 'xml-bridge' -type f)
          if readelf -l "$BINARY" | grep -q PT_INTERP; then
            echo "::error::Binary is NOT statically linked"
            exit 1
          fi
          echo "Verified: statically linked"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bridge-${{ matrix.target }}
          path: |
            bridges/xml/build/release/*.tar.gz*
            bridges/xml/build/release/*.zip*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: bridge-*
          merge-multiple: true
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#xml-bridge-v}" >> $GITHUB_OUTPUT

      - name: Create SHA256SUMS
        run: |
          cd artifacts
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum *.tar.gz *.zip > "xml-bridge-${VERSION}-SHA256SUMS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/xml-bridge-*-SHA256SUMS
          generate_release_notes: true
          body: |
            ## XML Bridge ${{ github.ref_name }}

            **Platforms:**
            - `linux-musl-x86_64` — statically linked, any Linux (Alpine, Ubuntu, NixOS, scratch)
            - `macos-aarch64` — Apple Silicon (M1/M2/M3+)
            - `windows-x86_64` — Windows 10/11

            **No shared library dependencies on Linux.**
            **No JVM required — binaries are native images.**
