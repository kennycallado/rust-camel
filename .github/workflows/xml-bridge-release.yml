name: XML Bridge Release

on:
  push:
    tags:
      - 'xml-bridge-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: bridges/xml/.gradle-docker-cache
          key: gradle-${{ hashFiles('bridges/xml/build.gradle.kts', 'bridges/xml/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#xml-bridge-v}" >> $GITHUB_OUTPUT

      - name: Build native bridge
        run: cargo xtask build-xml-bridge --version ${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bridge-linux-x86_64
          path: bridges/xml/build/release/*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: bridge-*
          merge-multiple: true
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#xml-bridge-v}" >> $GITHUB_OUTPUT

      - name: Create SHA256SUMS
        run: |
          cd artifacts
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum *.tar.gz > "xml-bridge-${VERSION}-SHA256SUMS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/xml-bridge-*-SHA256SUMS
          generate_release_notes: true
          body: |
            ## XML Bridge ${{ github.ref_name }}

            **Platform:** Linux x86_64 (glibc ≥ 2.34)
            **Requires:** Ubuntu 22.04+, Debian 12+, RHEL 9+, or NixOS with `programs.nix-ld.enable = true`

            macOS support is out of scope for this release. Use `CAMEL_XML_BRIDGE_BINARY_PATH` with a custom build if needed.
