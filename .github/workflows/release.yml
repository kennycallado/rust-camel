name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
            install-librdkafka: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            bin-suffix: ""
            kafka-features: "dynamic-linking"
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            bin-suffix: ".exe"
            kafka-features: "cmake-build"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cmake (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Install build deps for rdkafka (Linux native)
        if: matrix.install-librdkafka == true
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev libsasl2-dev pkg-config

      - name: Install target
        if: matrix.use-cross == false
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build -p camel-cli --release --target ${{ matrix.target }} --features "${{ matrix.kafka-features }}"
          else
            cargo build -p camel-cli --release --target ${{ matrix.target }} --features "${{ matrix.kafka-features }}"
          fi
        shell: bash

      - name: Rename binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/camel${{ matrix.bin-suffix }}" "dist/camel-${{ matrix.target }}${{ matrix.bin-suffix }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camel-${{ matrix.target }}
          path: dist/camel-${{ matrix.target }}${{ matrix.bin-suffix }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: camel-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/camel-*
          generate_release_notes: true

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure publish script is executable
        run: chmod +x ./deploy/publish-crates.sh
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ./deploy/publish-crates.sh
