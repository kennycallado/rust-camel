name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
            install-librdkafka: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            bin-suffix: ""
            kafka-features: "cmake-build"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: false
            bin-suffix: ""
            install-musl-tools: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
            bin-suffix: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            bin-suffix: ""
            kafka-features: "cmake-build"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
            bin-suffix: ".exe"
            kafka-features: "cmake-build"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cmake (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Install build deps (Linux native)
        if: matrix.install-librdkafka == true
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev libsasl2-dev

      - name: Install musl-tools
        if: matrix.install-musl-tools == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install target
        if: matrix.use-cross == false
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --version 0.2.5 --locked

      - name: Build binary
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build -p camel-cli --release --target ${{ matrix.target }} ${{ matrix.kafka-features && format('--features "{0}"', matrix.kafka-features) || '' }}
          else
            cargo build -p camel-cli --release --target ${{ matrix.target }} ${{ matrix.kafka-features && format('--features "{0}"', matrix.kafka-features) || '' }}
          fi
        shell: bash

      - name: Rename binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/camel${{ matrix.bin-suffix }}" "dist/camel-${{ matrix.target }}${{ matrix.bin-suffix }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: camel-${{ matrix.target }}
          path: dist/camel-${{ matrix.target }}${{ matrix.bin-suffix }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: camel-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/camel-*
          generate_release_notes: true

  publish:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure publish script is executable
        run: chmod +x ./scripts/publish-crates.sh
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ./scripts/publish-crates.sh

  docker:
    name: Docker (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: production
            suffix: ""
            target: production
          - variant: alpine
            suffix: "-alpine"
            target: alpine
    env:
      REGISTRY_GHCR: ghcr.io
      REGISTRY_DOCKERHUB: docker.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: camel-x86_64-unknown-linux-musl
          path: binary-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: camel-aarch64-unknown-linux-musl
          path: binary-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}

      - name: Prepare build context
        run: |
          mkdir -p context
          AMD64_BIN=$(find binary-amd64 -type f | head -1)
          ARM64_BIN=$(find binary-arm64 -type f | head -1)
          cp "$AMD64_BIN" context/camel-amd64
          cp "$ARM64_BIN" context/camel-arm64
          chmod +x context/camel-amd64 context/camel-arm64
          cp Dockerfile context/Dockerfile
          docker run --rm alpine:3.21 cat /etc/ssl/certs/ca-certificates.crt > context/ca-certificates.crt

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: context
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          build-args: TARGETARCH=amd64
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-amd64${{ matrix.suffix }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:latest-amd64${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: context
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          build-args: TARGETARCH=arm64
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-arm64${{ matrix.suffix }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:latest-arm64${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          for TAG in "${VERSION}${{ matrix.suffix }}" "latest${{ matrix.suffix }}"; do
            docker buildx imagetools create \
              -t ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${TAG} \
              -t ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}:${TAG} \
              ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64${{ matrix.suffix }} \
              ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${VERSION}-arm64${{ matrix.suffix }}
          done
