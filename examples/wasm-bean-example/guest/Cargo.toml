[package]
name = "text-utils-bean"
description = "WASM bean plugin example — text transformation with state"
version = "0.8.1"
edition = "2024"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# `async-spawn` provides `wit_bindgen::spawn_local`, required to write a
# returned `stream<u8>` concurrently with the guest's return. Writing inline
# before returning deadlocks: the component-model stream is a rendezvous with
# no buffer, so `write_all().await` blocks until the host reads — but the host
# only registers a consumer AFTER `invoke` returns. See emit_stream_body.
wit-bindgen = { version = "0.58", features = ["async-spawn"] }
