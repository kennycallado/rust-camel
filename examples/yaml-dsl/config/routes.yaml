# =============================================================================
# YAML Route Definitions for rust-camel - DSL Contract Showcase
# =============================================================================
#
# This file demonstrates all available DSL features including:
# - Basic steps: to, log, set_header, set_body, marshal, unmarshal
# - Control flow: filter, choice, stop
# - EIPs: split, multicast, wire_tap
# - Route-level: error_handler, circuit_breaker
# - Language expressions: simple:, rhai:
#
# =============================================================================

routes:
  # ===========================================================================
  # Route 1: Basic Pipeline with Headers
  # ===========================================================================
  - id: "timer-to-log"
    from: "timer:tick?period=5000&repeatCount=3"
    auto_startup: true
    startup_order: 100
    steps:
      - log: "Timer fired - basic pipeline"
      - set_header:
          key: "source"
          value: "yaml-timer"
      - to: "log:info?showHeaders=true"

  # ===========================================================================
  # Route 2: Filter with Simple Language Expression
  # ===========================================================================
  # Demonstrates filtering messages based on a Simple language predicate.
  # Only messages where header 'type' equals 'allowed' will be processed.
  #
  - id: "filter-demo"
    from: "timer:filter?period=3000&repeatCount=5"
    startup_order: 150
    steps:
      - set_header:
          key: "type"
          value: "allowed"
      - log: "Before filter - checking type header"
      - filter:
          simple: "${header.type} == 'allowed'"
          steps:
            - log: "PASSED FILTER - processing message"
            - to: "log:filtered"

  # ===========================================================================
  # Route 3: Content-Based Router (Choice/When/Otherwise)
  # ===========================================================================
  # Demonstrates routing messages based on header values using choice.
  #
  - id: "choice-demo"
    from: "timer:choice?period=4000&repeatCount=3"
    startup_order: 200
    steps:
      - set_header:
          key: "type"
          value: "order"
      - choice:
          when:
            - simple: "${header.type} == 'order'"
              steps:
                - log: "Processing ORDER"
                - to: "log:orders"
            - simple: "${header.type} == 'invoice'"
              steps:
                - log: "Processing INVOICE"
                - to: "log:invoices"
          otherwise:
            - log: "Processing UNKNOWN type"
            - to: "log:unknown"

  # ===========================================================================
  # Route 4: Split EIP
  # ===========================================================================
  # Demonstrates splitting a message body (one line per item).
  #
  - id: "split-demo"
    from: "timer:split?period=6000&repeatCount=2"
    startup_order: 250
    steps:
      - set_body:
          value: "apple\nbanana\ncherry"
      - log: "Before split - body has multiple lines"
      - split:
          expression: "body_lines"
          aggregation: "last_wins"
          steps:
            - log: "Split item: ${body}"
            - to: "log:split-item"

  # ===========================================================================
  # Route 4b: Split with Language Expression
  # ===========================================================================
  # Demonstrates splitting using a Simple language expression.
  # The expression is evaluated and the result determines how to split.
  #
  - id: "split-language-demo"
    from: "timer:split-lang?period=8000&repeatCount=1"
    startup_order: 255
    steps:
      - set_header:
          key: "items"
          value: "one,two,three,four"
      - log: "Split via language expression (comma-separated)"
      - split:
          expression:
            simple: "${header.items}"
          aggregation: "collect_all"
          steps:
            - log: "Language split item: ${body}"
            - to: "log:split-lang-item"

  # ===========================================================================
  # Route 5: WireTap EIP (Fire-and-Forget)
  # ===========================================================================
  # Demonstrates tapping a copy of the message to another endpoint.
  #
  - id: "wiretap-demo"
    from: "timer:wiretap?period=5000&repeatCount=2"
    startup_order: 300
    steps:
      - log: "Main pipeline - before wiretap"
      - wire_tap: "direct:audit"
      - log: "Main pipeline - after wiretap"
      - to: "log:main-output"

  # Receiver for wiretap
  - id: "wiretap-audit-receiver"
    from: "direct:audit"
    startup_order: 50
    steps:
      - log: "WIRETAP AUDIT - received copy of message"
      - to: "log:audit"

  # ===========================================================================
  # Route 6: Multicast EIP (Fan-out)
  # ===========================================================================
  # Demonstrates sending the same message to multiple endpoints.
  #
  - id: "multicast-demo"
    from: "timer:multicast?period=7000&repeatCount=2"
    startup_order: 350
    steps:
      - log: "Before multicast"
      - multicast:
          aggregation: "last_wins"
          steps:
            - to: "direct:endpoint-a"
            - to: "direct:endpoint-b"
      - log: "After multicast"

  - id: "multicast-receiver-a"
    from: "direct:endpoint-a"
    startup_order: 50
    steps:
      - log: "MULTICAST ENDPOINT A received message"
      - to: "log:endpoint-a"

  - id: "multicast-receiver-b"
    from: "direct:endpoint-b"
    startup_order: 50
    steps:
      - log: "MULTICAST ENDPOINT B received message"
      - to: "log:endpoint-b"

  # ===========================================================================
  # Route 7: Error Handler with Retry
  # ===========================================================================
  # Demonstrates route-level error handling with retry policy.
  #
  - id: "error-handler-demo"
    from: "timer:error?period=10000&repeatCount=1"
    startup_order: 400
    error_handler:
      dead_letter_channel: "log:dead-letter"
      retry:
        max_attempts: 3
        initial_delay_ms: 100
        multiplier: 2.0
        max_delay_ms: 5000
    steps:
      - log: "Processing with error handler configured"
      - to: "log:processed-with-retry"

  # ===========================================================================
  # Route 8: Circuit Breaker
  # ===========================================================================
  # Demonstrates route-level circuit breaker for resilience.
  #
  - id: "circuit-breaker-demo"
    from: "timer:cb?period=8000&repeatCount=2"
    startup_order: 450
    circuit_breaker:
      failure_threshold: 3
      open_duration_ms: 10000
    steps:
      - log: "Processing with circuit breaker protection"
      - to: "log:cb-protected"

  # ===========================================================================
  # Route 9: Set Body (Literal)
  # ===========================================================================
  # Demonstrates setting body to a literal value.
  # Note: Language expressions in set_body are supported but require explicit
  # value: field to avoid YAML parsing ambiguity.
  #
  - id: "set-body-demo"
    from: "timer:setbody?period=5000&repeatCount=2"
    startup_order: 500
    steps:
      - set_header:
          key: "greeting"
          value: "Hello"
      - set_body:
          value: "Hello World!"
      - log: "Body set to literal value"
      - to: "log:body-set"

  # ===========================================================================
  # Route 10: Stop EIP
  # ===========================================================================
  # Demonstrates stopping the pipeline early.
  #
  - id: "stop-demo"
    from: "timer:stop?period=10000&repeatCount=1"
    startup_order: 550
    steps:
      - log: "Before stop - this will appear"
      - stop: true
      - log: "After stop - this will NOT appear"

  # ===========================================================================
  # Route 11: Convert Body To (Type Conversion)
  # ===========================================================================
  # Demonstrates converting the message body between different types.
  # This route shows Text → Json conversion, parsing a JSON string into
  # structured data that can be processed as a Json body.
  #
  - id: "convert-body-demo"
    from: "timer:convert-tick?period=5000&repeatCount=3"
    startup_order: 600
    steps:
      - set_body:
          value: '{"message": "hello from YAML", "ts": 1}'
      - log: "Before conversion - body is Text containing JSON string"
      - convert_body_to: json
      - log: "After conversion - body is now Json type: ${body}"
      - to: "log:converted-json?showBody=true"

  # ===========================================================================
  # Route 12: Marshal/Unmarshal (Data Format Conversion)
  # ===========================================================================
  # Demonstrates marshaling and unmarshaling data between formats.
  # This route shows Text → Json (unmarshal) → Text (marshal) conversion,
  # useful for data format transformation scenarios.
  #
  - id: "marshal-unmarshal-demo"
    from: "timer:marshal-tick?period=5000&repeatCount=2"
    startup_order: 650
    steps:
      - set_body:
          value: '{"user": "alice", "action": "login", "timestamp": 12345}'
      - log: "Before unmarshal - body is Text"
      - unmarshal: json
      - log: "After unmarshal - body is Json type: ${body}"
      - marshal: json
      - log: "After marshal - body is Text again"
      - to: "log:marshal-result?showBody=true"
