# =============================================================================
# YAML Route Definitions for rust-camel
# =============================================================================
#
# This file demonstrates how to define Camel routes using YAML configuration.
# Routes are loaded at runtime and can be modified without recompiling.
#
# YAML Structure:
#   routes:         # Top-level array of route definitions
#     - id:         # Unique route identifier (required)
#       from:       # Source endpoint URI (required)
#       steps:      # Array of processing steps (optional)
#       auto_startup:  # Start route automatically (default: true)
#       startup_order: # Order for startup (default: 1000, lower = earlier)
#
# Available Step Types:
#   - to:           # Send to endpoint (e.g., "log:info", "direct:route")
#   - set_header:   # Set a message header
#   - log:          # Log a message
#
# =============================================================================

routes:
  # ===========================================================================
  # Route 1: Timer to Log
  # ===========================================================================
  # A simple route that fires every 2 seconds and logs a message.
  # This demonstrates the basic timer component and log step.
  #
  - id: "timer-to-log"
    from: "timer:tick?period=2000&repeatCount=5"
    auto_startup: true
    startup_order: 100
    steps:
      # Log a message at the start of processing
      - log: "Timer fired - processing exchange"

      # Set a header to identify the source
      - set_header:
          key: "source"
          value: "yaml-timer"

      # Send to log component with detailed output
      - to: "log:info?showHeaders=true&showCorrelationId=true"

  # ===========================================================================
  # Route 2: Header Manipulation Pipeline
  # ===========================================================================
  # Demonstrates setting multiple headers and using the direct component
  # for route linking. Shows how startup_order affects initialization.
  #
  - id: "header-pipeline"
    from: "timer:header-demo?period=3000&repeatCount=4"
    auto_startup: true
    startup_order: 200  # Starts after timer-to-log
    steps:
      # Set first header
      - set_header:
          key: "X-Request-Id"
          value: "req-001"

      # Set second header
      - set_header:
          key: "X-Source-System"
          value: "yaml-dsl-example"

      # Log the headers we set
      - log: "Headers configured, forwarding to direct:processor"

      # Forward to another route via direct component
      - to: "direct:processor"

  # ===========================================================================
  # Route 3: Direct Consumer (Sub-route)
  # ===========================================================================
  # This route receives messages from the direct:processor endpoint.
  # It demonstrates route linking and the direct component.
  #
  - id: "direct-processor"
    from: "direct:processor"
    auto_startup: true
    startup_order: 50  # Start early so it's ready when route 2 sends to it
    steps:
      - log: "Received message in direct:processor"

      - set_header:
          key: "processed-by"
          value: "direct-processor"

      - to: "log:processed?showHeaders=true&showBody=true&showCorrelationId=true"

  # ===========================================================================
  # Route 4: Disabled Route (auto_startup: false)
  # ===========================================================================
  # This route is defined but won't start automatically.
  # It can be started programmatically via the ControlBus component.
  #
  - id: "disabled-route"
    from: "timer:disabled?period=1000"
    auto_startup: false  # Won't start automatically
    startup_order: 300
    steps:
      - log: "This should not appear - route is disabled"
      - to: "log:disabled-output"

  # ===========================================================================
  # Route 5: Chained Processing Pipeline
  # ===========================================================================
  # A more complex route showing multiple steps in sequence.
  #
  - id: "chained-pipeline"
    from: "timer:chain?period=4000&repeatCount=3"
    auto_startup: true
    startup_order: 150
    steps:
      # Step 1: Log start
      - log: "=== Starting chained pipeline ==="

      # Step 2: Set correlation header
      - set_header:
          key: "pipeline"
          value: "chain-1"

      # Step 3: Intermediate processing log
      - log: "Step 1 complete, continuing..."

      # Step 4: Add another header
      - set_header:
          key: "stage"
          value: "processing"

      # Step 5: Log with all headers
      - to: "log:chain-step?showHeaders=true&showCorrelationId=true"

      # Step 6: Final log
      - log: "=== Pipeline complete ==="
