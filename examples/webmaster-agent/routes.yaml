routes:
  - id: "webmaster-review"
    from: "timer:webmaster?period=5000&repeatCount=1"
    steps:
      - to: "http://inventory.internal/api/orders?api_key=demo-key"
      - to: "embedding:sentence-transformer"
      - to: "vector:qdrant://orders-index"
      - to: "llm:chat?model=local-demo"
      - choice:
          when:
            - simple: "${header.priority} == 'high'"
              steps:
                - to: "log:priority"
          otherwise:
            - to: "log:normal"
      - to: "log:audit"
