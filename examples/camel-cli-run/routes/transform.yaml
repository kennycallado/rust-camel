routes:
  - id: "transform"
    from: "timer:transform?period=5000"
    steps:
      - set_body:
          simple: "${header.CamelTimerCounter} World"
      - set_header:
          key: "source"
          value: "camel-cli"
      # log: messages are evaluated as Simple Language — ${...} expressions are interpolated
      - log: "Transformed: ${body} (source=${header.source})"
