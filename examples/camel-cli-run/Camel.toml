[default]
routes = ["routes/*.yaml"]
log_level = "INFO"
watch = false

[default.components.jms]
broker_url = "tcp://localhost:61616"
broker_type = "artemis"
username = "artemis"
password = "artemis"

[default.supervision]
max_attempts = 5
initial_delay_ms = 1000
backoff_multiplier = 2.0
max_delay_ms = 60000

[development]
log_level = "DEBUG"
watch = true

[production]
log_level = "WARN"
watch = false
