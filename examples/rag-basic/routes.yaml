routes:
  - id: "rag-ingest"
    from: "timer:tick?period=100&repeatCount=1&delay=100"
    steps:
      - set_body:
          value: "AcmeCorp provides cloud-based customer support software. The platform includes ticket management, live chat, knowledge base, and analytics. Support plans: Starter ($29/mo), Professional ($79/mo), Enterprise (custom pricing). All plans include email support. Professional and Enterprise include phone and chat support. Contact sales@acmecorp.com for enterprise pricing."
      - to: "embedding:ollama?base_url=http://localhost:11434&model=embeddinggemma"
      - to: "vector:upsert?url=http://localhost:6334&collection=docs"
      - log:
          message: "Ingested sample document"

  - id: "rag-query"
    from: "timer:tick?period=100&repeatCount=1&delay=2000"
    steps:
      - set_body:
          value: "What support plans does AcmeCorp offer?"
      - set_header:
          key: question
          simple: "${body}"
      - to: "embedding:ollama?base_url=http://localhost:11434&model=embeddinggemma"
      - to: "vector:search?url=http://localhost:6334&collection=docs&top_k=3"
      - prompt_template:
          template: |
            Answer the question using only the context below. Be concise.
            Question: ${header.question}
            Context: ${body}
      - to: "llm:ollama?base_url=http://localhost:11434&model=qwen3.5:4b&think=false"
      - log:
          message:
            simple: "RAG answer: ${body}"
