<!DOCTYPE html>
<html>
<head>
<title>REST CRUD Example</title>
</head>
<body>
<h1>REST CRUD Example</h1>
<p>JSON API available at <code>/api/users</code></p>
<ul>
<li>GET <code>/api/users</code> &mdash; list users</li>
<li>POST <code>/api/users</code> &mdash; create user</li>
<li>PUT <code>/api/users/{id}</code> &mdash; update user</li>
<li>DELETE <code>/api/users/{id}</code> &mdash; delete user</li>
</ul>
</body>
</html>
