# Shared component defaults.
# This file is included by Camel.toml via `include = ["config/components.toml"]`.
# It can be reused across multiple deployment configurations without duplication.
# Profile-specific overrides in Camel.toml always take precedence (last-wins merge).

[components.http]
connect_timeout_ms = 30000
allow_internal = false

[components.kafka]
brokers = "localhost:9092"
group_id = "camel"
