[package]
name = "wasm-source-webhook-guest"
description = "WASM source plugin example — webhook inbound via host-provided HTTP listener"
version = "0.8.1"
edition = "2024"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# `async-spawn` provides `wit_bindgen::spawn_local`, required to emit a
# streaming submit-exchange body concurrently with the guest's call: the
# component-model stream is a rendezvous with no buffer, so `write_all().await`
# blocks until the host reads — but the host only registers its drain (via
# `Accessor::spawn`) AFTER `submit-exchange` returns. See emit_stream_echo.
wit-bindgen = { version = "0.58", features = ["async-spawn"] }
