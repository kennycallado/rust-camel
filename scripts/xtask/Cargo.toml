[package]
name = "xtask"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
camel-api = { path = "../../crates/camel-api" }
clap = { version = "4", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
regex = "1"
walkdir = "2"
zip = { version = "8", default-features = false, features = ["deflate"] }
serde_json = "1"
ureq = "3"
schemars = "1"
ts-rs = "12"

[lints]
workspace = true
